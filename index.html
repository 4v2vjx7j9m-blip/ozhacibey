<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öz Hacıbey Pideli Köfte</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.88)),
    url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1200&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    z-index:-1;
    filter:brightness(.8);
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(20,20,20,.82);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(14px);
    border-radius:28px;
    padding:32px 28px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,0,0,.45);
    animation:fade .9s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    border:3px solid #d8a14a;
    overflow:hidden;
    box-shadow:0 0 20px rgba(216,161,74,.45);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    margin-top:22px;
    font-size:31px;
    font-weight:700;
    line-height:1.2;
}

.gold{
    color:#d8a14a;
}

.subtitle{
    margin-top:12px;
    color:#d9d9d9;
    font-size:15px;
    line-height:1.7;
}

.info-box{
    margin-top:28px;
    background:rgba(255,255,255,.04);
    border-radius:18px;
    padding:18px;
}

.info{
    margin:10px 0;
    color:#d5d5d5;
    font-size:14px;
}

.buttons{
    margin-top:28px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.btn{
    text-decoration:none;
    padding:16px;
    border-radius:16px;
    font-weight:600;
    font-size:15px;
    transition:.25s;
    display:block;
}

.instagram{
    background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
    color:white;
}

.maps{
    background:#d8a14a;
    color:#111;
}

.call{
    background:white;
    color:#111;
}

.btn:hover{
    transform:translateY(-2px) scale(1.02);
}

.footer{
    margin-top:24px;
    font-size:12px;
    color:#999;
}

</style>
</head>
<body>

<div class="background"></div>

<div class="container">

<div class="card">

<div class="logo">
<img src="https://images.unsplash.com/photo-1529042410759-befb1204b468?q=80&w=500&auto=format&fit=crop" alt="">
</div>

<h1>
<span class="gold">Öz Hacıbey</span><br>
Pideli Köfte
</h1>

<p class="subtitle">
Bursa’nın geleneksel pideli köfte lezzeti.<br>
Kaliteli servis, eşsiz tat ve sıcak ortam.
</p>

<div class="info-box">

<div class="info">
📍 Millet Mah. 2. Vatan Cd. No:215<br>
Yıldırım / Bursa
</div>

<div class="info">
🕒 Her Gün 10:00 - 22:00
</div>

<div class="info">
📞 0544 422 37 85
</div>

</div>

<div class="buttons">

<a class="btn instagram"
href="https://www.instagram.com/ozhacibeypidelikofte2/"
target="_blank">
📸 Instagram
</a>

<a class="btn maps"
href="https://share.google/usRHKd4rLA1kN9db1"
target="_blank">
📍 Yol Tarifi
</a>

<a class="btn call"
href="tel:+905444223785">
📞 Hemen Ara
</a>

</div>

<div class="footer">
Öz Hacıbey Pideli Köfte © 2026
</div>

</div>

</div>

</body>
</html>
