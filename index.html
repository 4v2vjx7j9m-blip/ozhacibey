<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öz Hacıbey Pideli Köfte</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f0f0f;
    color:white;
}

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.88)),
    url('https://images.unsplash.com/photo-1551218808-94e220e084d2?q=80&w=1200&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    z-index:-1;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(20,20,20,.75);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:28px;
    padding:30px 25px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,0,0,.4);
}

.logo{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    border:3px solid #d8a14a;
    overflow:hidden;
    box-shadow:0 0 25px rgba(216,161,74,.4);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    margin-top:20px;
    font-size:30px;
    font-weight:700;
}

.gold{
    color:#d8a14a;
}

.subtitle{
    margin-top:10px;
    color:#d6d6d6;
    font-size:14px;
    line-height:1.6;
}

.info-box{
    margin-top:25px;
    background:rgba(255,255,255,.04);
    border-radius:16px;
    padding:16px;
}

.info{
    margin:8px 0;
    font-size:13px;
    color:#cfcfcf;
}

.buttons{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn{
    text-decoration:none;
    padding:15px;
    border-radius:14px;
    font-weight:600;
    font-size:15px;
    transition:.25s;
    display:block;
}

/* Instagram */
.instagram{
    background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
    color:white;
}

/* Google yorum */
.review{
    background:#d8a14a;
    color:#111;
}

/* Hemen ara (düzeltilmiş premium) */
.call{
    background:linear-gradient(135deg,#25d366,#1ebc59);
    color:white;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 8px 25px rgba(37,211,102,.25);
}

.btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.footer{
    margin-top:20px;
    font-size:11px;
    color:#888;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

<div class="card">

<!-- LOGO / ÜRÜN FOTO -->
<div class="logo">
<img src="https://i.lezzet.com.tr/images-xxlarge-recipe/gercek-bursa-pideli-kofte-tarifi-4255c50c-0f78-47bf-a604-1b863bbfe803.jpg" alt="Pideli Köfte">
</div>

<h1><span class="gold">Öz Hacıbey</span><br>Pideli Köfte</h1>

<p class="subtitle">
Bursa’nın geleneksel pideli köfte lezzeti.<br>
Sıcak ortam, kaliteli servis.
</p>

<div class="info-box">

<div class="info">
📍 Millet Mah. 2. Vatan Cd. No:215<br>
Yıldırım / Bursa
</div>

<div class="info">
🕒 Her Gün 10:00 - 22:00
</div>

<div class="info">
⭐ Google 5.0 Puan
</div>

</div>

<div class="buttons">

<a class="btn instagram"
href="https://www.instagram.com/ozhacibeypidelikofte2/"
target="_blank">
📸 Instagram
</a>

<a class="btn review"
href="https://share.google/usRHKd4rLA1kN9db1"
target="_blank">
⭐ Google Yorumları
</a>

<a class="btn call"
href="tel:+905444223785">
📞 Hemen Ara
</a>

</div>

<div class="footer">
© 2026 Öz Hacıbey Pideli Köfte
</div>

</div>

</div>

</body>
</html>
